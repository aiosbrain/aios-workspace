version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # eslint 10 blocked upstream: eslint-plugin-react (latest 7.37.5) peer-caps at
      # eslint ^9.7 and our flat config uses react.configs.flat.recommended. Revisit
      # when eslint-plugin-react ships eslint 10 support. (AIO-321)
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@eslint/js"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/gui/client"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # @vitejs/plugin-react 6 requires vite ^8, but gui/client is on vite ^6.
      # Landing it means a vite 6→8 migration — out of scope for weekly bumps.
      # Revisit alongside a deliberate vite 8 upgrade. (AIO-321)
      - dependency-name: "@vitejs/plugin-react"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
