name: ci

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref (saves CI time on rapid pushes).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-drift:
    name: Docs drift guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - run: npm run check:docs

  context-health:
    name: Context health guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - run: npm run check:context

  constitution:
    name: Constitution guards (domain isolation + size)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      # §4 domains-are-siblings (no cross-domain value imports) + the aios.mjs size gate (AIO-320).
      - run: npm run check:domains
      - run: npm run check:size

  guard:
    name: leak-gate + secrets + harness checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Confidentiality leak gate
        # Terms come from the AIOS_LEAK_TERMS_B64 secret (the public repo never stores them).
        # Without the secret the gate no-ops; with it, NDA identifiers fail the build.
        env:
          AIOS_LEAK_TERMS_B64: ${{ secrets.AIOS_LEAK_TERMS_B64 }}
        run: bash scripts/leak-gate.sh .

      - name: Secret scan
        run: bash validation/check-secrets.sh .

      - name: Harness syntax check
        run: |
          for f in scaffold/.claude/skills/*/*.workflow.js; do
            node -e "const s=require('fs').readFileSync('$f','utf8'); new Function('agent','parallel','pipeline','phase','log','args','budget','workflow','return (async()=>{'+s.replace(/export const meta/,'const meta')+'})')" \
              && echo "ok: $f" || { echo "FAIL: $f"; exit 1; }
          done

      - name: Sync CLI syntax check
        run: node --check scripts/aios.mjs

      - name: Skill-scan + install-gate tests
        run: |
          node test/agent-readiness-glob.test.mjs
          node test/skill-scan.test.mjs
          node test/skill-install.test.mjs
          node test/suggest-connectors.test.mjs
          node test/skill-install-marketplace.test.mjs
          node test/slack-cli-sync.test.mjs
          node test/ux/judge.test.mjs
          node test/ux/driver.test.mjs
          node test/ux/tool-policy.test.mjs
          node test/ux/proc.test.mjs
          node test/ux/json-extract.test.mjs
          node test/ux/run-ux-skip.test.mjs
          node test/analyze.test.mjs
          node test/analyze-multitool.test.mjs
          node test/tasks-table.test.mjs
          node --test gui/server/session-index.test.mjs
          node scripts/lock-marketplace.mjs --check

      - name: Runtime-adapter contract tests (BYOA Phase 3)
        run: |
          # the ACP adapter imports @agentclientprotocol/sdk (peer: zod); the rest
          # of the mappers need no deps. Install just these, then run every adapter
          # test incl. the recorded-transcript fixtures.
          npm install --no-save @agentclientprotocol/sdk@^0.25.1 zod@^4.4.3
          node --test gui/server/runtime-adapters/*.test.mjs

      - name: Scaffold smoke test + validate (project profile)
        run: |
          bash scripts/scaffold-project.sh \
            --slug ci-sample-team-ops --stakeholder "Sample Co" --lead alex \
            --members "alex,sam,jordan" --org your-github-org --currency USD \
            --output /tmp/ci-sample-team-ops
          bash validation/validate-all.sh /tmp/ci-sample-team-ops

      - name: Scaffold smoke test + validate (legacy engagement profile)
        run: |
          bash scripts/scaffold-engagement.sh \
            --slug ci-sample-eng-ops --client "Sample Co" --captain alex \
            --members "alex,sam,jordan" --org your-github-org --currency USD \
            --output /tmp/ci-sample-eng-ops
          bash validation/validate-all.sh /tmp/ci-sample-eng-ops

      - name: Scaffold smoke test + validate (business-owner context)
        run: |
          bash scripts/scaffold-project.sh \
            --context business-owner \
            --slug ci-sample-bo-ops --stakeholder "Sample Co" --owner alex \
            --members "alex,sam,jordan" --org your-github-org --currency USD \
            --output /tmp/ci-sample-bo-ops
          bash validation/validate-all.sh /tmp/ci-sample-bo-ops
          # 6-business/ must exist and must never be in sync_include (AIO-351).
          test -d /tmp/ci-sample-bo-ops/6-business
          ! grep -A20 '^sync_include:' /tmp/ci-sample-bo-ops/aios.yaml | grep -q '6-business'

      - name: Sync client offline smoke (status + dry-run push)
        run: |
          node scripts/aios.mjs status --repo /tmp/ci-sample-team-ops
          node scripts/aios.mjs push --dry-run --repo /tmp/ci-sample-team-ops
          node scripts/aios.mjs status --porcelain --repo /tmp/ci-sample-team-ops

      - name: Onboard non-TTY smoke (prints guidance, exits 0)
        run: node scripts/aios.mjs onboard --repo /tmp/ci-sample-team-ops < /dev/null

  lint:
    name: lint + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Prettier (format check)
        run: npm run format:check

  tests:
    name: unit tests (npm test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - run: npm ci
      - name: Gateway approval contract
        run: npm run test:gateway-approval-contracts
      - name: Install optional ACP peer (server boot in the GUI search test)
        # The cockpit search route test (gui/server/sessions-search.test.mjs) boots the
        # real GUI server, which statically loads every runtime adapter — incl. the ACP
        # adapter (peer: zod). npm ci doesn't carry these (kept --no-save like the guard
        # job), so install them here. claude-agent-sdk arrives via npm ci (devDependency).
        run: npm install --no-save @agentclientprotocol/sdk@^0.25.1 zod@^4.4.3
      - name: npm test
        run: npm test
      - name: Coverage report (non-blocking)
        continue-on-error: true
        run: npm run test:coverage
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore
