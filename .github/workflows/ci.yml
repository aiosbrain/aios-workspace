name: ci

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref (saves CI time on rapid pushes).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-drift:
    name: Docs drift guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm run check:docs

  context-health:
    name: Context health guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm run check:context

  constitution:
    name: Constitution guards (domain isolation + size)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      # §4 domains-are-siblings (no cross-domain value imports) + the aios.mjs size gate (AIO-320).
      - run: npm run check:domains
      - run: npm run check:size
      - run: npm run check:inbox-audit

  guard:
    name: leak-gate + secrets + harness checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Confidentiality leak gate
        # Terms come from the AIOS_LEAK_TERMS_B64 secret (the public repo never stores them).
        # Without the secret the gate no-ops; with it, NDA identifiers fail the build.
        env:
          AIOS_LEAK_TERMS_B64: ${{ secrets.AIOS_LEAK_TERMS_B64 }}
        run: bash scripts/leak-gate.sh .

      - name: Secret scan
        run: bash validation/check-secrets.sh .

      - name: Harness syntax check
        run: |
          for f in scaffold/.claude/skills/*/*.workflow.js; do
            if node -e "const s=require('fs').readFileSync('$f','utf8'); new Function('agent','parallel','pipeline','phase','log','args','budget','workflow','return (async()=>{'+s.replace(/export const meta/,'const meta')+'})')"; then
              echo "ok: $f"
            else
              echo "FAIL: $f"
              exit 1
            fi
          done

      - name: Sync CLI syntax check
        run: node --check scripts/aios.mjs

      # All test files, including skill/runtime contracts, run exactly once in
      # the sharded Node suite. Keep only unique static/security checks here.
      - name: Marketplace lock check
        run: node scripts/lock-marketplace.mjs --check

      - name: Scaffold smoke test + validate (project profile)
        run: |
          bash scripts/scaffold-project.sh \
            --slug ci-sample-team-ops --stakeholder "Sample Co" --lead alex \
            --members "alex,sam,jordan" --org your-github-org --currency USD \
            --output /tmp/ci-sample-team-ops
          bash validation/validate-all.sh /tmp/ci-sample-team-ops

      - name: Scaffold smoke test + validate (legacy engagement profile)
        run: |
          bash scripts/scaffold-engagement.sh \
            --slug ci-sample-eng-ops --client "Sample Co" --captain alex \
            --members "alex,sam,jordan" --org your-github-org --currency USD \
            --output /tmp/ci-sample-eng-ops
          bash validation/validate-all.sh /tmp/ci-sample-eng-ops

      - name: Scaffold smoke test + validate (business-owner context)
        run: |
          bash scripts/scaffold-project.sh \
            --context business-owner \
            --slug ci-sample-bo-ops --stakeholder "Sample Co" --owner alex \
            --members "alex,sam,jordan" --org your-github-org --currency USD \
            --output /tmp/ci-sample-bo-ops
          bash validation/validate-all.sh /tmp/ci-sample-bo-ops
          # 6-business/ must exist and must never be in sync_include (AIO-351).
          test -d /tmp/ci-sample-bo-ops/6-business
          ! grep -A20 '^sync_include:' /tmp/ci-sample-bo-ops/aios.yaml | grep -q '6-business'

      - name: Sync client offline smoke (status + dry-run push)
        run: |
          node scripts/aios.mjs status --repo /tmp/ci-sample-team-ops
          node scripts/aios.mjs push --dry-run --repo /tmp/ci-sample-team-ops
          node scripts/aios.mjs status --porcelain --repo /tmp/ci-sample-team-ops

      - name: Onboard non-TTY smoke (prints guidance, exits 0)
        run: node scripts/aios.mjs onboard --repo /tmp/ci-sample-team-ops < /dev/null

      - name: Onboarding eval lab smoke (mock driver + mock judge)
        # Proves the vendored lab's own wiring (setup -> install -> grade -> judge ->
        # aggregate) still runs end to end — catches a scaffold/CLI change breaking a
        # scenario's fixture, or a future sync-eval-lab.sh --apply pulling a core
        # incompatible with this repo's adapters, before either merges green.
        run: |
          bash evals/run.sh --runtime mock --scenario all --runs 1 --judge mock \
            --results-dir /tmp/ci-eval-lab-smoke
          jq -e '.total > 0 and .by_status.pass == .total' /tmp/ci-eval-lab-smoke/summary.json

  lint:
    name: lint + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Prettier (format check)
        run: npm run format:check

  node-tests:
    name: Node tests (${{ matrix.shard }}/3)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run shard
        run: npm run test:node -- --shard=${{ matrix.shard }}/3 --concurrency=2

  client-tests:
    name: GUI client tests + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:client
      - run: npm run gui:build

  coverage:
    name: Corrected coverage ratchet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Production-only coverage
        run: npm run test:coverage
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage/coverage-summary.json
            coverage/lcov.info
          if-no-files-found: ignore
          retention-days: 7

  rust-tests:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: rust-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
      - run: npm ci
      - run: npm run test:rust

  install-smoke:
    name: Clean production install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:install-smoke

  mutation:
    name: Changed-code mutation (calibration)
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:mutation

  test-gate:
    name: Required test gate
    if: always()
    runs-on: ubuntu-latest
    needs:
      - docs-drift
      - context-health
      - constitution
      - guard
      - lint
      - node-tests
      - client-tests
      - coverage
      - rust-tests
      - install-smoke
    steps:
      - name: Require every mandatory lane
        env:
          DOCS: ${{ needs.docs-drift.result }}
          CONTEXT: ${{ needs.context-health.result }}
          CONSTITUTION: ${{ needs.constitution.result }}
          GUARD: ${{ needs.guard.result }}
          LINT: ${{ needs.lint.result }}
          NODE: ${{ needs.node-tests.result }}
          CLIENT: ${{ needs.client-tests.result }}
          COVERAGE: ${{ needs.coverage.result }}
          RUST: ${{ needs.rust-tests.result }}
          INSTALL: ${{ needs.install-smoke.result }}
        run: |
          for result in "$DOCS" "$CONTEXT" "$CONSTITUTION" "$GUARD" "$LINT" \
            "$NODE" "$CLIENT" "$COVERAGE" "$RUST" "$INSTALL"; do
            test "$result" = success || {
              echo "mandatory CI result(s): docs=$DOCS context=$CONTEXT constitution=$CONSTITUTION guard=$GUARD lint=$LINT node=$NODE client=$CLIENT coverage=$COVERAGE rust=$RUST install=$INSTALL"
              exit 1
            }
          done
