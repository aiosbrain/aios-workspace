name: pr-backlog

on:
  schedule:
    - cron: "0 9 * * 1" # Monday 09:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  actions: read

jobs:
  report:
    name: stale PR backlog report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Generate report
        env:
          GH_TOKEN: ${{ github.token }}
        run: npm run pr:backlog -- --repo "${{ github.repository }}" >> "$GITHUB_STEP_SUMMARY"
