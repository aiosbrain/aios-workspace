# loop-models.example.yaml — per-step model config for the agent relay (plan/build/ship).
#
# Copy to .aios/loop-models.yaml (gitignored) and tune. Flat keys only (see flat-yaml.mjs).
#
# MODEL REF SYNTAX (runtime-agnostic):
#   <provider>:<modelId>   explicit routing
#   vendor/model             OpenRouter (when no prefix)
#   bare id                  inferred (deepseek* → DeepSeek API, claude* → Claude CLI, glm* → OpenCode, …)
#
# Providers:
#   claude     Claude Code CLI (agentic: plan/build/fix)
#   cursor     Cursor agent CLI (agentic or prompt)
#   opencode   OpenCode Go API (prompt) or `opencode run` (agentic)
#   deepseek   DeepSeek direct API (prompt)
#   openrouter OpenRouter API (prompt)
#
# DIVERSITY GUARD: build≠code_review family, plan≠plan_review family (fail closed).
# AGENTIC GUARD: plan/build/fix/fix_escalated need claude|cursor|opencode — not openrouter/deepseek alone.

# recon_model: claude:claude-haiku-4-5
# plan_model: claude:claude-opus-4-8
# plan_effort: xhigh
# plan_review_model: opencode:glm-5.2
# plan_review_model: opencode:kimi-k2.7-code
# plan_review_model: openrouter:moonshotai/kimi-k2.5
# plan_review_model: deepseek:deepseek-v4-pro

# build_model: claude:claude-sonnet-5
# build_effort: high
# build_model: opencode:glm-5.2
# code_review_model: deepseek:deepseek-v4-pro
# code_review_model: openrouter:deepseek/deepseek-chat
