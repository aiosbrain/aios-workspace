# Competitive Landscape Graph — Three Pillars (OSS product strategy)
# access: shared (Vibrana + reviewer) | created: 2026-06-05 | type: competitive-landscape-graph
# Companion to: 2026-06-05-oss-three-pillars-landscape.md
#
# Field legend:
#   type:        oss-company | oss-community | oss-academic | commercial-closed | source-available | platform
#   maturity:    flagship | mature | growing | nascent | toy   (traction, not code quality)
#   stars:       approximate GitHub stars (directional only — see data caveat in report); null if closed
#   funding:     web-verified where present; "unverified" / null otherwise
#   role:        primitive | framework | runtime | platform | search | builder | incumbent | skill-pack | tutor | lms
#   fit:         direct | adjacent | building-block | dependency | study-only
#   recommendation: fork | compose | study | watch | avoid | position-against
#   overlaps:    list of pillar ids this entry touches

meta:
  date: 2026-06-05
  pillars:
    company-graph: "Machine-readable org context feeding static knowledge into dynamic AI apps"
    team-agentic-os: "Shared repo where multiple humans + agents collaborate w/ shared skills + integrations"
    learning-platform: "AI-native, org-context-aware, multi-department personalized corporate L&D"
  thesis: >
    The three pillars are one system. Company Graph is the static substrate; Team Agentic OS
    and Learning Platform are dynamic consumers. Commercial leaders bundle the substrate inside
    closed runtimes — the portable, governed, open context layer is the defensible wedge.
  durable_differentiators:
    - governance-first (access tiers, NDA/legal chains, approval gates, PII audit, multi-client isolation)
    - curated + declarative (not auto-extracted, not black-box runtime)
    - consulting/knowledge-work native (not code-native)
  sequencing: [company-graph, team-agentic-os, learning-platform]
  data_caveat: >
    OSS star counts gathered partly via a mirrored GitHub index; treat as directional.
    Commercial funding figures web-verified. Disco funding conflicts across sources (unverified).

